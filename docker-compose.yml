services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: opensea-postgres
    environment:
      POSTGRESQL_USERNAME: docker
      POSTGRESQL_PASSWORD: docker
      POSTGRESQL_DATABASE: apiopensea
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docker -d apiopensea']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opensea-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  greenmail:
    image: greenmail/standalone:2.1.2
    container_name: opensea-greenmail
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.users=test@opensea.local:secret
        -Dgreenmail.verbose
    ports:
      - '3025:3025'   # SMTP
      - '3143:3143'   # IMAP
      - '3465:3465'   # SMTPS
      - '3993:3993'   # IMAPS
      - '8080:8080'   # REST API
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 3025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
