# fly.toml - OpenSea API Configuration
# Documentation: https://fly.io/docs/reference/configuration/
#
# Scheduled jobs (cron):
#   The application image ships with standalone cron scripts under `scripts/`
#   exposed as npm scripts. They are designed to be invoked by an external
#   scheduler (Fly Machines `--schedule`, Kubernetes CronJob, GitHub Actions
#   `schedule:`, systemd timer, etc.). They are NOT registered here as a Fly
#   process because Fly machine processes are long-running and would conflict
#   with the in-process schedulers already running inside `app`.
#
#   To run them on Fly.io, create a dedicated machine per job, e.g.:
#     fly machine run . --schedule daily      --command "npm run cron:hr-doc-expiry"          --region gru -a opensea-api
#     fly machine run . --schedule monthly    --command "npm run cron:hr-vacation-accrual"    --region gru -a opensea-api
#     fly machine run . --schedule monthly    --command "npm run cron:hr-payroll-generation"  --region gru -a opensea-api
#
#   Full docs and per-job behaviour: docs/guides/hr-cron-jobs.md

app = 'opensea-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3333'

[deploy]
  release_command = "sh scripts/release.sh"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1

[metrics]
  port = 3333
  path = '/metrics'

[checks]
  [checks.health]
    port = 3333
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '120s'
    method = 'GET'
    path = '/health/live'
