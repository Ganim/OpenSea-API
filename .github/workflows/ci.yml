# =============================================================================
# CI Pipeline — OpenSea-API
# =============================================================================
# Jobs: Lint & Type Check → Unit Tests → Build
# All jobs run Prisma generate (required for TypeScript imports).
# Uses concurrency groups to cancel stale runs on the same branch.
# =============================================================================

name: CI

on:
  push:
    branches: ['*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Type Check
  # Runs ESLint and TypeScript compiler (--noEmit) in sequence.
  # Both require Prisma Client to resolve imports correctly.
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      # tsc --noEmit is informational only (pre-existing type errors exist).
      # Tracks progress toward full type safety without blocking CI.
      - name: Run TypeScript type check (informational)
        continue-on-error: true
        run: npx tsc --noEmit 2>&1 | tail -5
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests
  # Runs vitest with coverage report. Uploads coverage as artifact.
  # Runs in parallel with lint-typecheck for faster feedback.
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ---------------------------------------------------------------------------
  # Job 3: Build
  # Compiles the project with tsup. Only runs after lint + tests pass.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-unit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build project
        run: npm run build
