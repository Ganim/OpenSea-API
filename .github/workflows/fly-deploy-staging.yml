# Deploy staging to Fly.io on push to develop
name: Fly Deploy (Staging)

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    concurrency: deploy-api-staging
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Staging)
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Staging Smoke Test
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://opensea-api-staging.fly.dev/health/live)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging health check failed with status $STATUS"
            exit 1
          fi
          echo "Staging health check passed (HTTP $STATUS)"
