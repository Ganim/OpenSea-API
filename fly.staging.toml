# fly.staging.toml - OpenSea API Staging Configuration
# Deploy: flyctl deploy --config fly.staging.toml --remote-only

app = 'opensea-api-staging'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'staging'
  PORT = '3333'
  ENABLE_SWAGGER = 'true'

[deploy]
  release_command = "sh scripts/release.sh"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    port = 3333
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '120s'
    method = 'GET'
    path = '/health/live'
